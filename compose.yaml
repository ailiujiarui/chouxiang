services:
  api:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.12-slim}
    image: refactor-agent:local
    working_dir: /workspace/repo
    environment:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
      REFACTOR_AGENT_RUN_ROOT: /data/runs
      REFACTOR_AGENT_DATABASE: /data/refactor_agent.sqlite
      REFACTOR_AGENT_GITHUB_WORKSPACE_ROOT: /data/github-workspaces
      REFACTOR_AGENT_SANDBOX_BACKEND: docker
      REFACTOR_AGENT_MOCK_LLM: ${REFACTOR_AGENT_MOCK_LLM:-true}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      REFACTOR_AGENT_ADMIN_TOKEN: ${REFACTOR_AGENT_ADMIN_TOKEN:-local-admin-secret}
      REFACTOR_AGENT_ALLOWED_REPOSITORIES: ${REFACTOR_AGENT_ALLOWED_REPOSITORIES:-owner/repository}
    volumes:
      - refactor-agent-memory:/data
      - .:/workspace/repo:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "127.0.0.1:${REFACTOR_AGENT_API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 12
    command: ["serve", "--host", "0.0.0.0", "--port", "8000"]

  refactor-agent:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.12-slim}
    image: refactor-agent:local
    working_dir: /workspace/repo
    environment:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
      REFACTOR_AGENT_RUN_ROOT: /data/runs
      REFACTOR_AGENT_DATABASE: /data/refactor_agent.sqlite
      REFACTOR_AGENT_GITHUB_WORKSPACE_ROOT: /data/github-workspaces
    volumes:
      - refactor-agent-memory:/data
      - .:/workspace/repo:ro
    command: ["memories", "--limit", "20"]

  dashboard:
    image: refactor-agent:local
    build:
      context: .
      dockerfile: docker/app.Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.12-slim}
    working_dir: /workspace/repo
    environment:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
      REFACTOR_AGENT_RUN_ROOT: /data/runs
      REFACTOR_AGENT_DATABASE: /data/refactor_agent.sqlite
      REFACTOR_AGENT_GITHUB_WORKSPACE_ROOT: /data/github-workspaces
      REFACTOR_AGENT_DASHBOARD_DB: /data/refactor_agent.sqlite
      REFACTOR_AGENT_API_URL: http://api:8000
    volumes:
      - refactor-agent-memory:/data
      - .:/workspace/repo:ro
    ports:
      - "127.0.0.1:${REFACTOR_AGENT_DASHBOARD_PORT:-8501}:8501"
    depends_on:
      api:
        condition: service_healthy
    command: ["dashboard", "--host", "0.0.0.0", "--port", "8501", "--api-url", "http://api:8000"]

volumes:
  refactor-agent-memory:
